<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="/sokie-mobile/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Sokie — get local errands done, or earn running them.">
  <meta name="theme-color" content="#14211B">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Sokie">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Sokie</title>
  <link rel="manifest" href="manifest.json">

  <!-- Cloudflare Turnstile (signup/sign-in bot protection, 2026-07-18).
       Rendered explicitly from Dart via the helpers below -- see
       lib/widgets/turnstile_widget.dart. -->
  <script src="https://challenges.cloudflare.com/turnstile/v0/api.js?render=explicit" defer></script>
  <script>
    window.sokieRenderTurnstile = function (elementId, sitekey, cb) {
      return turnstile.render('#' + elementId, {
        sitekey: sitekey,
        callback: function (token) { cb(token); },
        'expired-callback': function () { cb(''); },
        'error-callback': function () { cb(''); }
      });
    };
    window.sokieResetTurnstile = function (widgetId) {
      try { turnstile.reset(widgetId); } catch (e) { }
    };
  </script>
</head>
<body>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
